<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="description" content="Your AI-powered digital wardrobe manager. Upload clothes, get styled by AI, and discover what your closet needs." />

    <meta property="og:description" content="Your AI-powered digital wardrobe manager. Upload clothes, get styled by AI, and discover what your closet needs." />

  <body>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });

</html>

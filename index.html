<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>StyleOS - AI Digital Closet</title>
    <meta name="description" content="Your AI-powered digital wardrobe manager. Upload clothes, get styled by AI, and discover what your closet needs." />
    <meta name="author" content="StyleOS" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="StyleOS - AI Digital Closet" />
    <meta property="og:description" content="Your AI-powered digital wardrobe manager. Upload clothes, get styled by AI, and discover what your closet needs." />

    <meta name="twitter:image" content="/icons/icon-512.png" />
  <!-- v3.9 -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(function (reg) {
            try { reg.update(); } catch (e) {}
            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            reg.addEventListener('updatefound', function () {
              var nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', function () {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  nw.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
            setInterval(function () { try { reg.update(); } catch (e) {} }, 60 * 1000);
          }).catch(function () {});
        });
      }
    </script>
  </body>
</html>
